services:
  # Nginx — serves static files and proxies to the Node backend
  nginx:
    image: nginx:alpine
    container_name: muther_nginx
    restart: unless-stopped
    ports:
      - "8080:80"   # Accessible locally at http://localhost:8080
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/var/www/public:ro
    depends_on:
      - muther_app
    networks:
      - muther_net

  # Node.js backend — WebSocket server + REST API for sessions
  muther_app:
    image: node:22-alpine
    container_name: muther_app
    environment:
      - MUTHER_PASSWORD=${MUTHER_PASSWORD:-WY_ACCESS_6000} # Default password if .env is missing
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./:/app
      - /app/node_modules   # Prevents cross-platform dependency crashes
    restart: unless-stopped
    networks:
      - muther_net

networks:
  muther_net:
    driver: bridge