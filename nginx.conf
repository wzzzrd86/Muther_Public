events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name localhost; # Accepts any local network or localhost incoming request

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Static files (index.html, crew.html, muther.html, style.css, etc.)
        location / {
            root /var/www/public;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # WebSocket proxy for real-time terminal messages
        location /ws {
            proxy_pass http://muther_app:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400; # Keep connection alive for 24 hours
        }

        # REST API proxy for session management
        location /api/ {
            proxy_pass http://muther_app:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            client_max_body_size 10M;
        }
    }
}